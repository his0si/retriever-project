events {
    worker_connections 1024;
}

http {
    # 기본 보안 설정
    server_tokens off;
    
    upstream frontend {
        server frontend:3000;
    }

    upstream api {
        server api:8000;
    }

    # HTTP 서버 (Let's Encrypt 인증용)
    server {
        listen 80;
        server_name retrieverproject.duckdns.org;

        # Let's Encrypt 인증을 위한 경로
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 나머지는 HTTPS로 리다이렉트
        location / {
            return 301 https://$server_name$request_uri;
        }
    }
}